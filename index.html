<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Changelog</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg: #ffffff;
            --bg-container: #f6f8fa;
            --border: #d0d7de;
            --text: #24292f;
            --text-muted: #57606a;
            --link: #0969da;
            --code-bg: rgba(175, 184, 193, 0.2);
            --btn-bg: #f6f8fa;
            --btn-border: #d0d7de;
            --btn-text: #24292f;
        }
        [data-theme="dark"] {
            --bg: #0d1117;
            --bg-container: #161b22;
            --border: #30363d;
            --text: #e6edf3;
            --text-muted: #8b949e;
            --link: #58a6ff;
            --code-bg: rgba(110, 118, 129, 0.2);
            --btn-bg: #21262d;
            --btn-border: #30363d;
            --btn-text: #e6edf3;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
            line-height: 1.6;
            color: var(--text);
            background-color: var(--bg);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            transition: background-color 0.2s, color 0.2s;
        }
        .container {
            max-width: 800px;
            width: 100%;
            padding: 20px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background-color: var(--bg-container);
        }
        h1, h2, h3 {
            margin-top: 24px;
            margin-bottom: 16px;
            font-weight: 600;
            line-height: 1.25;
        }
        h1 { font-size: 2em; border-bottom: 1px solid var(--border); padding-bottom: 0.3em; }
        h2 { font-size: 1.5em; border-bottom: 1px solid var(--border); padding-bottom: 0.3em; }
        h3 { font-size: 1.25em; }
        a { color: var(--link); text-decoration: none; }
        a:hover { text-decoration: underline; }
        code {
            padding: 0.2em 0.4em;
            margin: 0;
            font-size: 85%;
            background-color: var(--code-bg);
            border-radius: 6px;
            font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Consolas, Liberation Mono, monospace;
        }
        ul { padding-left: 2em; }
        li { margin-bottom: 0.25em; }
        img { max-width: 100%; height: auto; border-radius: 6px; cursor: zoom-in; }

        #lightbox {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            cursor: zoom-out;
        }
        #lightbox.open { display: flex; }
        #lightbox img {
            max-width: 95vw;
            max-height: 95vh;
            border-radius: 8px;
            cursor: default;
            box-shadow: 0 8px 40px rgba(0,0,0,0.6);
        }
        #lightbox-close {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 1001;
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 8px;
            color: #fff;
            font-size: 20px;
            width: 40px;
            height: 40px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #lightbox-close:hover { background: rgba(255,255,255,0.25); }

        #theme-toggle {
            position: fixed;
            top: 16px;
            right: 16px;
            background: var(--btn-bg);
            border: 1px solid var(--btn-border);
            color: var(--btn-text);
            border-radius: 6px;
            padding: 6px 10px;
            cursor: pointer;
            font-size: 16px;
            line-height: 1;
            transition: background-color 0.2s, border-color 0.2s;
        }
        #theme-toggle:hover { opacity: 0.8; }

        #content:empty::before {
            content: "Loading changelog...";
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    <button id="theme-toggle" title="Toggle dark mode">🌙</button>
    <div id="lightbox">
        <span id="lightbox-close" title="Close">✕</span>
        <img id="lightbox-img" src="" alt="">
    </div>
    <div class="container">
        <div id="content"></div>
    </div>

    <script>
        const btn = document.getElementById('theme-toggle');
        const root = document.documentElement;

        const saved = localStorage.getItem('theme') ||
            (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        applyTheme(saved);

        btn.addEventListener('click', () => {
            applyTheme(root.dataset.theme === 'dark' ? 'light' : 'dark');
        });

        function applyTheme(theme) {
            root.dataset.theme = theme;
            btn.textContent = theme === 'dark' ? '☀️' : '🌙';
            localStorage.setItem('theme', theme);
        }

        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');

        function openLightbox(src, alt) {
            lightboxImg.src = src;
            lightboxImg.alt = alt;
            lightbox.classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            lightbox.classList.remove('open');
            document.body.style.overflow = '';
        }

        lightbox.addEventListener('click', closeLightbox);
        lightboxImg.addEventListener('click', e => e.stopPropagation());
        document.getElementById('lightbox-close').addEventListener('click', closeLightbox);
        document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

        document.addEventListener('DOMContentLoaded', () => {
            const contentDiv = document.getElementById('content');
            fetch('CHANGELOG.md')
                .then(response => {
                    if (!response.ok) throw new Error('Failed to load CHANGELOG.md');
                    return response.text();
                })
                .then(text => {
                    contentDiv.innerHTML = marked.parse(text);
                    contentDiv.querySelectorAll('img').forEach(img => {
                        img.addEventListener('click', () => openLightbox(img.src, img.alt));
                    });
                })
                .catch(error => {
                    contentDiv.innerHTML = `<p style="color: #cf222e;">Error loading changelog: ${error.message}</p>
                                          <p>Make sure <code>CHANGELOG.md</code> exists in the same directory.</p>`;
                });
        });
    </script>
</body>
</html>
